<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0b1e3d"/>

  <!-- Diver silhouette (simplified, facing right) -->
  <!-- Head -->
  <circle cx="32" cy="16" r="6" fill="#00d4ff"/>
  <!-- Mask -->
  <rect x="27" y="14" width="10" height="6" rx="2" fill="#0b1e3d" opacity="0.6"/>
  <!-- Tank -->
  <rect x="24" y="22" width="7" height="14" rx="3" fill="#00a8cc"/>
  <!-- Body/BCD -->
  <rect x="27" y="22" width="10" height="14" rx="3" fill="#00d4ff"/>
  <!-- Regulator hose -->
  <path d="M27 25 Q20 25 20 30" stroke="#00a8cc" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <path d="M37 26 Q44 24 46 28" stroke="#00d4ff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M29 36 L26 46" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M34 36 L36 46" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Fins -->
  <ellipse cx="23" cy="47" rx="6" ry="2.5" fill="#00d4ff" transform="rotate(-20 23 47)"/>
  <ellipse cx="38" cy="47" rx="6" ry="2.5" fill="#00d4ff" transform="rotate(20 38 47)"/>

  <!-- Bubbles -->
  <circle cx="44" cy="18" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="50" cy="11" r="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6"/>
  <circle cx="56" cy="6"  r="1.2" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
</svg>
